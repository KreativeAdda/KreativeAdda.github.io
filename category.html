<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Category | Kreative.Adda</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <audio id="siteMusic" src="assets/background-music.mp3" loop preload="auto"></audio>
    <button class="music-toggle" id="musicToggle" type="button" aria-label="Play background music">Music</button>
    <header class="topbar">

      <nav aria-label="Category navigation"><a href="index.html#gallery">Gallery</a><a href="shop.html">Shop</a><a href="index.html#about">About</a><a href="index.html#contact">Contact</a></nav>

    <main class="shop-shell">
      <section class="shop-hero">
        <p class="eyebrow" id="categoryEyebrow">Kreative.Adda Gallery</p>
        <h1 id="categoryTitle">Category</h1>
      </section>
      <section class="section">
        <div class="gallery-grid" id="categoryGalleryGrid"></div>
        <p class="empty-state visible" id="categoryEmptyState">No public uploads yet for this category.</p>
      </section>
    </main>
    <footer><span class="footer-credit">Kreative.Adda by Avi Narang <img class="footer-logo" src="assets/footer-logo.png" alt="Avi Narang personal logo" /></span></footer>
    <script src="shared.js"></script><script src="music.js"></script><script src="category.js"></script>
  </body>
</html>
